<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BiciParking | Overture Maps</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --lime: #c8f54a; 
      --dark: #0f1410; 
      --panel: #161d17; 
      --border: #2a3a2b; 
      --text: #d4e8d5; 
      --muted: #6b8a6d;
      --bike-blue: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Syne', sans-serif;
      background: var(--dark);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
    }

    .brand-name { font-size: 1.2rem; font-weight: 800; color: #fff; }

    .btn-ui {
      background: var(--dark);
      color: var(--lime);
      border: 1px solid #fff; 
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      outline: none;
    }

    .control-bottom-left {
      position: absolute;
      bottom: 2rem;
      left: 1.5rem;
      z-index: 1100;
    }

    .control-bottom-right {
      position: absolute;
      bottom: 2rem;
      right: 1.5rem;
      z-index: 1100;
    }

    .fab-btn {
      width: 50px;
      height: 50px;
      background: #fff; 
      color: var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      font-size: 1.5rem;
      border: none;
      cursor: pointer;
    }

    #statsBar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0.45rem 1.25rem;
      display: flex;
      justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .stat-value { color: var(--lime); font-weight: 700; }

    #map-wrapper { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; background: #f8f9fa; }

    .bike-marker {
      width: 28px; height: 28px;
      background: var(--bike-blue); 
      border: 2px solid #fff;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .bike-marker-inner { transform: rotate(45deg); font-size: 13px; font-weight: bold; color: #fff; }

    .user-marker {
      width: 18px; height: 18px;
      background: #ff0000; 
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255,0,0,0.5);
    }

    .leaflet-popup-content-wrapper { 
      background: var(--panel) !important; 
      color: var(--text) !important; 
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    
    .leaflet-popup-tip { 
      background: var(--panel) !important; 
      border-left: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: auto !important;
    }
    
    .popup-title { 
      font-weight: 800; 
      color: var(--lime); 
      background: transparent; 
      padding: 8px 12px 4px 12px;
      margin: 0;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    
    .popup-body { 
      padding: 8px 12px; 
    }

    .tag-row { 
      display: flex; 
      justify-content: space-between; 
      gap: 15px; 
      margin-bottom: 2px; 
      font-size: 0.65rem; 
      font-family: 'Space Mono', monospace;
    }
    .tag-key { color: var(--muted); }
    .tag-val { color: #fff; font-weight: bold; }

    #overlay {
      position: absolute; inset: 0; background: rgba(255, 255, 255, 0.7);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1500; transition: opacity 0.3s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 40px; height: 40px; border: 4px solid #eee;
      border-top: 4px solid var(--bike-blue); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="brand-name">BiciParking</div>
  <button class="btn-ui" onclick="fetchParkings()">RECARGAR</button>
</header>

<div id="statsBar">
  <div>📍 <span id="statCoords" class="stat-value">Localizando...</span></div>
  <div>🅿️ Encontrados: <span id="statCount" class="stat-value">0</span></div>
</div>

<div id="map-wrapper">
  <div id="map"></div>

  <div class="control-bottom-left">
    <select id="radiusSelect" class="btn-ui" onchange="handleRadiusChange()">
      <option value="500" selected>500 m</option>
      <option value="2000">2 km</option>
      <option value="5000">5 km</option>
      <option value="10000">10 km</option>
    </select>
  </div>

  <div class="control-bottom-right">
    <button class="fab-btn" onclick="recenterMap()" title="Centrar ubicación">🎯</button>
  </div>

  <div id="overlay">
    <div class="loader-ring"></div>
    <div style="margin-top:10px; font-size:0.7rem; color:var(--bike-blue); font-weight:bold; letter-spacing: 2px;">ESCANEANDO...</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  let map, userMarker, radiusCircle, userCoords;
  let parkingLayer = L.layerGroup();

  const traducciones = {
    "capacity": "Capacidad",
    "covered": "Cubierto",
    "bicycle_parking": "Soporte",
    "operator": "Operador",
    "fee": "De pago",
    "surveillance": "Vigilancia",
    "yes": "Sí",
    "no": "No",
    "stands": "U invertida", // CAMBIO: Solo muestra "U invertida"
    "wall_loops": "Soportes de pared",
    "sheffield": "U invertida (Sheffield)",
    "anchors": "Anclajes",
    "bollard": "Bolardo",
    "rack": "Rack / Parrilla",
    "informal": "Informal / Vallas",
    "building": "Edificio",
    "lockers": "Taquillas",
    "floor": "Anclaje a suelo"
  };

  function t(val) { 
    if (!val) return "No disponible";
    return traducciones[val.toLowerCase()] || val; 
  }

  async function initMap(lat, lng) {
    userCoords = [lat, lng];
    if (!map) {
      map = L.map('map', { zoomControl: true }).setView(userCoords, 16);
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a> &copy; <a href="https://overturemaps.org">Overture Maps</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      parkingLayer.addTo(map);

      map.on('move', () => {
        const center = map.getCenter();
        if (radiusCircle) radiusCircle.setLatLng(center);
        updateStatsCoords(center.lat, center.lng);
      });

      map.on('moveend', () => {
        fetchParkings();
      });
    }

    const userIcon = L.divIcon({
      className: '',
      html: '<div class="user-marker"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    if (userMarker) userMarker.setLatLng(userCoords);
    else userMarker = L.marker(userCoords, { icon: userIcon, zIndexOffset: 1000 }).addTo(map);

    if (radiusCircle) radiusCircle.setLatLng(map.getCenter());
    else {
      radiusCircle = L.circle(map.getCenter(), {
        radius: parseInt(document.getElementById('radiusSelect').value),
        color: '#ff0000',
        fillColor: 'transparent',
        fillOpacity: 0.0, 
        weight: 1,
        dashArray: '5, 5'
      }).addTo(map);
    }

    updateStatsCoords(lat, lng);
    fetchParkings();
  }

  function getLocation() {
    if (!navigator.geolocation) { fallback(); return; }
    navigator.geolocation.getCurrentPosition(
      pos => { initMap(pos.coords.latitude, pos.coords.longitude); },
      err => { fallback(); },
      { enableHighAccuracy: true, timeout: 5000 }
    );
  }

  function recenterMap() {
    if (userCoords) {
      map.setView(userCoords, 16);
    } else {
      getLocation();
    }
  }

  function fallback() { initMap(40.4168, -3.7038); }

  async function fetchParkings() {
    const radius = document.getElementById('radiusSelect').value;
    const center = map.getCenter();
    showOverlay();

    const query = `[out:json][timeout:25];(node["amenity"="bicycle_parking"](around:${radius},${center.lat},${center.lng});way["amenity"="bicycle_parking"](around:${radius},${center.lat},${center.lng}););out center;`;
    
    try {
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: 'data=' + encodeURIComponent(query)
      });
      const data = await res.json();
      renderMarkers(data.elements);
    } catch (err) {
      console.error("Error Overpass:", err);
    } finally {
      hideOverlay();
    }
  }

  function renderMarkers(elements) {
    parkingLayer.clearLayers();
    document.getElementById('statCount').textContent = elements.length;

    const bikeIcon = L.divIcon({
      className: '',
      html: '<div class="bike-marker"><div class="bike-marker-inner">P</div></div>',
      iconSize: [28, 28],
      iconAnchor: [14, 28],
      popupAnchor: [0, -28]
    });

    elements.forEach(el => {
      const lat = el.lat ?? el.center?.lat;
      const lng = el.lon ?? el.center?.lon;
      const dist = getDistance(userCoords[0], userCoords[1], lat, lng);
      const tags = el.tags || {};
      
      let rows = `<div class="tag-row"><span class="tag-key">Distancia</span><span class="tag-val">${dist}</span></div>`;
      
      ["bicycle_parking", "capacity", "covered"].forEach(k => {
        if (tags[k]) {
          rows += `<div class="tag-row"><span class="tag-key">${t(k)}</span><span class="tag-val">${t(tags[k])}</span></div>`;
        }
      });

      const content = `
        <div style="min-width:180px">
          <div class="popup-title">Punto de Anclaje</div>
          <div class="popup-body">
            ${rows}
          </div>
        </div>`;

      L.marker([lat, lng], { icon: bikeIcon }).bindPopup(content).addTo(parkingLayer);
    });
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    const d = R * c;
    return d > 1 ? `${d.toFixed(1)} km` : `${(d * 1000).toFixed(0)} m`;
  }

  function handleRadiusChange() {
    const r = parseInt(document.getElementById('radiusSelect').value);
    radiusCircle.setRadius(r);
    map.setZoom(r <= 500 ? 16 : 14);
    fetchParkings();
  }

  function updateStatsCoords(lat, lng) {
    document.getElementById('statCoords').textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  }

  function showOverlay() { document.getElementById('overlay').classList.remove('hidden'); }
  function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

  window.addEventListener('DOMContentLoaded', getLocation);
</script>
</body>
</html>
